name: Lint

on:
  push:
    branches:
      - main
      - codex/**
      - Codex/**
      - claude/**
  pull_request:

# Cancel superseded runs of the same workflow on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff==0.4.7 black==24.4.2 isort==5.13.2 mypy==1.10.0

      - name: Run Python quality gates
        run: make lint
