[mypy]
python_version = 3.11
ignore_missing_imports = True
warn_unused_configs = True
show_error_codes = True

# Legacy OpenCV/NumPy analyzer modules are dynamically typed and need a
# dedicated annotation pass. Keep service/persistence/API-adjacent modules
# checked while isolating this known technical debt.
[mypy-video_analysis.biomechanics_visualizer]
ignore_errors = True

[mypy-video_analysis.cycling_analyzer]
ignore_errors = True

[mypy-video_analysis.exercise_analyzer]
ignore_errors = True

[mypy-video_analysis.running_analyzer]
ignore_errors = True

[mypy-video_analysis.stroke_analyzer]
ignore_errors = True

[mypy-video_analysis.swimmer_detector]
ignore_errors = True

[mypy-video_analysis.swimming_pose_analyzer]
ignore_errors = True

[mypy-video_analysis.trajectory_analyzer]
ignore_errors = True

[mypy-video_analysis.video_overlay]
ignore_errors = True

[mypy-video_analysis.video_tools]
ignore_errors = True
