[mypy]
python_version = 3.11
ignore_missing_imports = True
warn_unused_configs = True
show_error_codes = True

# The three big sport analyzers are still dynamically typed and need a
# dedicated annotation pass (20+ errors each with numpy/cv2 installed).
# Everything else in video_analysis is fully checked.
[mypy-video_analysis.cycling_analyzer]
ignore_errors = True

[mypy-video_analysis.running_analyzer]
ignore_errors = True

[mypy-video_analysis.stroke_analyzer]
ignore_errors = True
